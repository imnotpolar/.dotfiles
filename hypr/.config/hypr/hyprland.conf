$modules = ~/.config/hypr/modules

source = $modules/apps
source = $modules/keybinds
source = $modules/envs
source = $modules/exec
source = $modules/winrules

monitor = DP-2, 2560x1440@144, 0x0, 1

general {
	border_size = 3
	no_border_on_floating = true
	gaps_in = 4
	gaps_out = 8
	gaps_workspaces = 0

	col.inactive_border = 0xff000000
	col.active_border = 0xffffffff
	col.nogroup_border = 0xffffaaff
	col.nogroup_border_active = 0xffff00ff

	layout = dwindle
	no_focus_fallback = false
	resize_on_border = false
	extend_border_grab_area = 15
	hover_icon_on_border = true
	allow_tearing = true
	resize_corner = 0

	snap {
		enabled = false
		window_gap = 10
		monitor_gap = 10
		border_overlap = false
	}
}

dwindle {
	pseudotile = true
	force_split = 0
	preserve_split = true
	smart_split = false
	permanent_direction_override = false
	special_scale_factor = 1
	split_width_multiplier = 1
	use_active_for_splits = true
	default_split_ratio = 1
	split_bias = 0

}

decoration {
	rounding = 8
	rounding_power = 4

	active_opacity = 1
	inactive_opacity = 0.95
	fullscreen_opacity = 1

	dim_inactive = false
	dim_strength = 0.05
	dim_special = 0.5
	dim_around = 0.5
	screen_shader =
	border_part_of_window = false

	blur {
		enabled = true
		size = 5
		passes = 2
		ignore_opacity = true
		new_optimizations = true
		xray = false
		noise = 0
		contrast = 0.9
		brightness = 0.9
		vibrancy = 1
		vibrancy_darkness = 0
		special = false
		popups = false
		popups_ignorealpha = 0.2
		input_methods = false
		input_methods_ignorealpha = 0.2
	}

	shadow {
		enabled = true
		range = 3
		render_power = 3
		sharp = false
		ignore_window = true
		color = 0xee1a1a1a
		scale = 1
	}
}

animations {
	enabled = true
	first_launch_animation = false

	bezier = easeInOutSine, 0.37, 0, 0.63, 1

	animation = windows, 1, 1, easeInOutSine, popin 80%
	animation = layers, 1, 1, easeInOutSine, slide
	animation = workspaces, 1, 1, easeInOutSine, slidefadevert 20%
	animation = specialWorkspace, 1, 2, easeInOutSine, fade

}

input {
	kb_model =
	kb_layout = us, us
	kb_variant = ,intl
	kb_options = grp:alt_shift_toggle
	kb_rules =
	kb_file =

	numlock_by_default = true
	resolve_binds_by_sym = false
	repeat_rate = 25
	repeat_delay = 500

	sensitivity = -0.5
	accel_profile =
	force_no_accel = false
	left_handed = false
	scroll_points =
	scroll_method =
	scroll_button = 0
	scroll_button_lock = 0
	scroll_factor = 1
	natural_scroll = false

	follow_mouse = 1
	follow_mouse_threshold = 0
	focus_on_close = 1
	mouse_refocus = true
	float_switch_override_focus = 1
	special_fallthrough = false
	off_window_axis_events = 1
	emulate_discrete_scroll = 1
}

misc {
	disable_hyprland_logo = true
	disable_splash_rendering = true
	font_family = JetBrains Mono
	vrr = 0
	mouse_move_enables_dpms = false
	key_press_enables_dpms = false
	always_follow_on_dnd = true
	layers_hog_keyboard_focus = true
	animate_manual_resizes = false
	animate_mouse_windowdragging = false
	disable_autoreload = false
	enable_swallow = false
	swallow_regex =
	swallow_exception_regex =
	focus_on_activate = false
	mouse_move_focuses_monitor = true
	render_ahead_of_time = false
	render_ahead_safezone = 1
	allow_session_lock_restore = true
	background_color = 0x000000
	close_special_on_empty = true
	new_window_takes_over_fullscreen = 0
	exit_window_retains_fullscreen = false
	initial_workspace_tracking = 1
	middle_click_paste = true
	render_unfocused_fps = 15
	disable_xdg_env_checks = false
	disable_hyprland_qtutils_check = false
	lockdead_screen_delay = 1000
	enable_anr_dialog = true
}

binds {
	pass_mouse_when_bound = false
	scroll_event_delay = 300
	workspace_back_and_forth = false
	allow_workspace_cycles = false
	workspace_center_on = 0
	focus_preferred_method = 0
	ignore_group_lock = false
	movefocus_cycles_fullscreen = false
	movefocus_cycles_groupfirst = false
	disable_keybind_grabbing = false
	window_direction_monitor_fallback = true
	allow_pin_fullscreen = false
}

xwayland {
	enabled = true
	use_nearest_neighbor = true
	force_zero_scaling = false
	create_abstract_socket = false
}

opengl {
	nvidia_anti_flicker = true
}

render {
	explicit_sync = 2
	explicit_sync_kms = 2
	direct_scanout = 0
	expand_undersized_textures = false
	xp_mode = false
	cm_fs_passthrough = 2
	cm_enabled = true
}

cursor {
	sync_gsettings_theme = true
	no_hardware_cursors = 2
	no_break_fs_vrr = 2
	min_refresh_rate = 24
	hotspot_padding = 1
	inactive_timeout = 0
	no_warps = false
	persistent_warps = false
	warp_on_change_workspace = 0
	default_monitor = DP-2
	zoom_factor = 1
	zoom_rigid = true
	enable_hyprcursor = true
	hide_on_key_press = true
	use_cpu_buffer = 2
	warp_back_after_non_mouse_input = false
}

ecosystem {
	no_update_news = true
}

experimental {
	xx_color_management_v4 = false
}
